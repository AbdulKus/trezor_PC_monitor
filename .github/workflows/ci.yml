name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        shell: pwsh
        run: >-
          cmake -S . -B build/windows
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build/windows --config Release --parallel

      - name: Test
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = 'offscreen'
          ctest --test-dir build/windows -C Release --output-on-failure

      - name: Verify firmware artifacts
        shell: pwsh
        run: |
          $expected = @{}
          Get-Content firmware/prebuilt/SHA256SUMS.txt | ForEach-Object {
            if ($_ -match '^([0-9a-fA-F]{64})\s+(.+)$') {
              $expected[$Matches[2]] = $Matches[1].ToLowerInvariant()
            }
          }
          foreach ($name in @('pcmonitor-inner.bin', 'pcmonitor-signed.bin')) {
            $actual = (Get-FileHash "firmware/prebuilt/$name" -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $expected[$name]) { throw "Hash mismatch for $name" }
          }
          $inner = [IO.File]::ReadAllBytes('firmware/prebuilt/pcmonitor-inner.bin')
          $signed = [IO.File]::ReadAllBytes('firmware/prebuilt/pcmonitor-signed.bin')
          if ([Text.Encoding]::ASCII.GetString($inner, 0, 4) -ne 'TRZF') { throw 'Inner firmware is not TRZF' }
          if ([Text.Encoding]::ASCII.GetString($signed, 0, 4) -ne 'TRZR') { throw 'Signed firmware is not TRZR' }
